services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-intex}
      POSTGRES_USER: ${POSTGRES_USER:-intex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-intex} -d ${POSTGRES_DB:-intex}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  harborlight_nexus_api:
    build:
      context: ./backend/Intex.Api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: ${CONNECTIONSTRINGS__DEFAULTCONNECTION}
      # Published API image has no CSVs; mount the repo snapshot so CsvRelationalSeeder can load full data.
      Seed__CsvPath: /data/lighthouse_csv_v7
      Jwt__Issuer: Intex.Api
      Jwt__Audience: Intex.Frontend
      Jwt__Key: ${JWT__KEY}
      Cors__AllowedOrigins__0: http://localhost:5173
    volumes:
      - ./ml-pipelines/lighthouse_csv_v7:/data/lighthouse_csv_v7:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "5173:5173"
    depends_on:
      - harborlight_nexus_api
    restart: on-failure

volumes:
  postgres-data:
