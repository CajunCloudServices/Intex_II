name: Deploy Tanglaw Project

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tanglaw-project-prod-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on:
      - self-hosted
      - cajuncloud-prod
    steps:
      - uses: actions/checkout@v4

      - name: Deploy on production runner
        run: bash scripts/deploy-production.sh
