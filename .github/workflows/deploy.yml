name: Deploy Tanglaw Project

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tanglaw-project-prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Record server-side deploy sync
        env:
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          echo "Production deploy is synchronized on the server by harborlight-auto-deploy.timer."
          echo "Queued main SHA: ${DEPLOY_SHA}"
