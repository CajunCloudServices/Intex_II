name: Deploy Tanglaw Project

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: tanglaw-project-prod-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for server-side deploy sync
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          echo "Waiting for production sync of ${EXPECTED_SHA}"
          sleep 75

      - name: Verify production health
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --max-time 15 \
            https://tanglawproject.cajuncloudservices.com/api/health >/dev/null
